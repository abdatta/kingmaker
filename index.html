<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>Kingmaker — OpalAI Proposal Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    html, body, #root { height: 100%; }
    body {
      background: #020617; /* slate-950 */
      color: #f1f5f9; /* slate-100 */
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    /* tighter scrollbars on dark canvas */
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
    *::-webkit-scrollbar-thumb:hover { background: #334155; border: 2px solid transparent; background-clip: content-box; }
    /* AI pulse */
    @keyframes km-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(1.4); }
    }
    .km-pulse { animation: km-pulse 1.8s ease-in-out infinite; }
    /* progress shimmer for in-progress bars */
    @keyframes km-shimmer {
      0% { background-position: -200px 0; }
      100% { background-position: 200px 0; }
    }
    .km-shimmer {
      background: linear-gradient(90deg, rgba(34,211,238,0.0), rgba(34,211,238,0.35), rgba(34,211,238,0.0));
      background-size: 200px 100%;
      animation: km-shimmer 2.4s linear infinite;
    }
    /* hide native focus outline; we draw our own with rings */
    button, [role=button] { outline: none; }
    /* selection */
    ::selection { background: rgba(34,211,238,0.3); color: #f8fafc; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <!-- lucide as plain (icon font-style via SVG sprite) -->
  <script src="https://unpkg.com/lucide@0.451.0/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react" src="data.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="icons.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="primitives.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="shell.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="dashboard.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="pipeline.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="workspace.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="other-screens.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="tweaks-panel.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="app.jsx"></script>
</body>
</html>
