name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# One concurrent deployment at a time; never cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Project-site base path: https://<user>.github.io/<repo>/
          # For a user/org site or custom domain, set this to '/' instead.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: SPA fallback (copy index.html → 404.html)
        # React Router uses History API; without this, deep links hit
        # GitHub Pages' 404 page on hard refresh.
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        # Pages defaults to Jekyll, which strips _ -prefixed files and the
        # like. We want a static-as-is upload.
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
